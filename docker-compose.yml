# Полный стек: Postgres + миграции + Next.js приложение.
# Переменные берутся из .env (docker compose подхватывает его автоматически).
# Запуск:  docker compose up -d --build

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Порт наружу не публикуем — БД доступна только внутри docker-сети.

  # Одноразовый сервис: применяет миграции и завершается. app ждёт его успеха.
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      SITE_NAME: ${SITE_NAME}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      # Слушаем только localhost VPS — наружу выставляет Nginx (HTTPS).
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
